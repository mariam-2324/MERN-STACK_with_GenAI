<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Quiz App</h1>

    <div class="main">
        <div id="box">
            <h3 id="quesBox">This is the dummy question</h3>
            <div class="row">
                <input class="options" id="option1" type="radio" value="a" name="option">
                <label for="Option 1">Option 1</label>
            </div>
            <div class="row">
                <input class="options" id="option2" type="radio" value="b" name="option">
                <label for="Option 2">Option 2</label>
            </div>
            <div class="row">
                <input class="options" id="option3" type="radio" value="c" name="option">
                <label for="Option 3">Option 3</label>
            </div>
            <div class="row">
                <input class="options" id="option4" type="radio" value="d" name="option">
                <label for="Option 4">Option 4</label>
            </div>
            <button class="btn" onclick="submitQuiz()">Submit</button>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
