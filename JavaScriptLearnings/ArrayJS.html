// Q-1 find cube of all these elements
// if digits > 350 then minus 7 from it
// use reduce to sum all filtered elements

const digits = [8, 6, 9, 4, 23, 7, 5, 8];

const cube = digits.map(digit => digit ** 3);
const filteredMarks = cube.filter(digit => digit > 350)

const subTotal = filteredMarks.map(digit => digit -= 7)

const Total = subTotal.reduce((acc, val) => acc, val, 0)

console.log(Total);
