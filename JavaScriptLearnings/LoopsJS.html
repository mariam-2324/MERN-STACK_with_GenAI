// SIMPLE PROGRAM TO GET A RANDOM NUMBER FROM USER

let secretNo = 10;
let count = 10;
let guessed = false

while(count > 0 && !guessed) {
    let userNo = Number(prompt("Enter a number"))
    if(secretNo === userNo) {
        console.log("Congratulation, You guessed the correct number");
        guessed = true
        break;
        
    } else if(userNo > secretNo) {
        console.log("High, guess low");
        count--
    } else if (userNo < secretNo) {
        console.log("low, guess high");
        count--    
    } else{
        console.log("Invalid number");
    }
}
